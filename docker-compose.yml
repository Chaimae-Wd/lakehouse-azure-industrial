version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: ocp_postgres

    restart: always

    environment:
      POSTGRES_DB: industrial_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
  pgadmin:
    image: dpage/pgadmin4:latest

    container_name: ocp_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ocp.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres
volumes:

  postgres_data:
